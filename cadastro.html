<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Carlos Iago e Matheus de Cristo">
    <meta name="description" content="Tela de cadastro da AutoZone Brasil">
    <meta name="keywords" content="cadastro, AutoZone, loja automotiva">
    <title>Cadastro - AutoZone Brasil</title>
    <link rel="stylesheet" href="css/estiloautozone.css">
</head>
<body>

    <header class="topo">
        <div class="container topo-inner">
            <div class="logo-area">
                <img src="img/Logo.png" alt="Logomarca da AutoZone Brasil" width="150">
                <h1>AutoZone Brasil</h1>
            </div>
        </div>
    </header>

    <nav class="menu">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
    </nav>

    <main class="auth">
        <section class="auth-card">
            <h2>Cadastro</h2>

            <form id="formCadastro">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>

                <label for="emailCadastro">E-mail</label>
                <input type="email" id="emailCadastro" required>

                <label for="senhaCadastro">Senha</label>
                <input type="password" id="senhaCadastro" required>

                <label for="confirmarSenha">Confirmar senha</label>
                <input type="password" id="confirmarSenha" required>

                <p id="mensagemCadastro"></p>

                <button type="submit">Cadastrar</button>
            </form>

            <a href="login.html" class="link">Já tenho conta</a>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
